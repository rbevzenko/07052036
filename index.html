<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>До 7 мая 2036</title>
  <meta name="description" content="Обратный отсчёт дней до 7 мая 2036 года">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="07.05.2036">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 8vh;
      min-height: 100vh;
      font-family: 'Times New Roman', Times, serif;
      font-weight: bold;
    }

    .label {
      font-size: clamp(1.2rem, 3.5vw, 2.2rem);
      text-align: center;
      margin-bottom: 0.5em;
      line-height: 1.5;
      opacity: 0.9;
      padding: 0 1rem;
    }

    .days {
      font-size: clamp(6rem, 22vw, 18rem);
      font-weight: bold;
      line-height: 1;
      letter-spacing: -0.02em;
    }


  </style>
</head>
<body>
  <p class="label">До 7 мая 2036 года осталось <span id="days-label">…</span> дн. <span id="h-label">…</span> часов <span id="m-label">…</span> минут <span id="s-label">…</span> секунд</p>
  <div class="days" id="days">…</div>

  <script>
    const TARGET = new Date('2036-05-07T00:00:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    const ONE_YEAR_MS = 365.25 * 24 * 3600 * 1000;

    function update() {
      const now = new Date();
      const diff = TARGET - now;
      if (diff < ONE_YEAR_MS) {
        document.body.style.backgroundColor = '#ffb6c1';
      }
      if (diff <= 0) {
        document.getElementById('days').textContent = '0';
        document.getElementById('days-label').textContent = '0';
        document.getElementById('h-label').textContent = '0';
        document.getElementById('m-label').textContent = '0';
        document.getElementById('s-label').textContent = '0';
        return;
      }
      const totalSec = Math.floor(diff / 1000);
      const days = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      document.getElementById('days').textContent = days.toLocaleString('ru-RU');
      document.getElementById('days-label').textContent = days.toLocaleString('ru-RU');
      document.getElementById('h-label').textContent = h;
      document.getElementById('m-label').textContent = m;
      document.getElementById('s-label').textContent = s;
    }

    update();
    setInterval(update, 1000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
